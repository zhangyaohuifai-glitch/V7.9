    function uploadDriverData(){
        if(!state.dActive||!state.dPlate) return;
        const stations=getStations(), coords=getCoords(), idx=Math.min(state.dIndex,coords.length-1);
        const data = {
            plate:state.dPlate, phone:state.dPhone, mode:state.dMode,
            station:stations[idx]||'', lat:coords[idx]?coords[idx].lat:0, lng:coords[idx]?coords[idx].lng:0,
            direction:state.dDirection, isNormalReversed:state.dIsNormalReversed,
            passengers:state.dPass, max:state.dMax, full:state.dFull,
            timestamp:firebase.database.ServerValue.TIMESTAMP
        };
        db.ref('van/active_buses/'+sanitizeKey(state.dPlate)).set(data);
    }

    function stopDriverUpload(){

    function renderRouteScroll(){
        const container=document.getElementById('d-route-container');
        if(!state.dActive){ container.style.display='none'; return; }
        container.style.display='flex';
        const stations=getStations();
        container.innerHTML = stations.map((s,i)=>`<div class="station-node${i===state.dIndex?' active':''}"><div class="dot"></div><div class="station-name">${s}</div></div>`).join('');
        setTimeout(()=>{ const a=container.querySelector('.station-node.active'); if(a) a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); },100);
    }

    function moveNext(){
        const stations=getStations();
        if(state.dMode==='busy'){
            if(state.dDirection==='out'){
                if(state.dIndex<stations.length-1) state.dIndex++; else { state.dDirection='in'; state.dIndex=stations.length-1; }
            } else {
                if(state.dIndex>0) state.dIndex--; else { state.dDirection='out'; state.dIndex=0; }
            }
        } else {
            if(!state.dIsNormalReversed){
                if(state.dIndex<stations.length-1) state.dIndex++; else { state.dIsNormalReversed=true; state.dIndex=stations.length-1; }
            } else {
                if(state.dIndex>0) state.dIndex--; else { state.dIsNormalReversed=false; state.dIndex=0; }
            }
        }
        state.dIsDatang=(state.dIndex===0);
        uploadDriverData(); updateDriverUI();
    }

    function movePrev(){
        const stations=getStations();
        if(state.dMode==='busy'){
            if(state.dDirection==='out'){
                if(state.dIndex>0) state.dIndex--; else { state.dDirection='in'; state.dIndex=0; }
            } else {
                if(state.dIndex<stations.length-1) state.dIndex++; else { state.dDirection='out'; state.dIndex=stations.length-1; }
            }
        } else {
            if(!state.dIsNormalReversed){
                if(state.dIndex>0) state.dIndex--; else { state.dIsNormalReversed=true; state.dIndex=0; }
            } else {
                if(state.dIndex<stations.length-1) state.dIndex++; else { state.dIsNormalReversed=false; state.dIndex=stations.length-1; }
            }
        }
        state.dIsDatang=(state.dIndex===0);
        uploadDriverData(); updateDriverUI();
    }

    function switchDirection(){
        if(state.dMode==='busy') state.dDirection = state.dDirection==='out'?'in':'out';
        else state.dIsNormalReversed = !state.dIsNormalReversed;
        uploadDriverData(); updateDriverUI();
    }

    function changePassengers(delta){
        state.dPass = Math.max(0, Math.min(state.dMax, state.dPass+delta));
        state.dFull = state.dPass >= state.dMax;
        uploadDriverData(); updateDriverUI();
    }

    function toggleFull(){
        state.dFull = !state.dFull;
        state.dPass = state.dFull ? state.dMax : Math.min(state.dPass, state.dMax-1);
        uploadDriverData(); updateDriverUI();
    }

    function startRecording(btn, timerEl){
        if(state.mediaRecorder && state.mediaRecorder.state!=='inactive') return;
        if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ alert('瀏覽器不支援錄音'); return; }
        navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
            state.mediaRecorder = new MediaRecorder(stream);
            state.audioChunks = [];
            state.mediaRecorder.ondataavailable = e=>state.audioChunks.push(e.data);
            state.mediaRecorder.onstop = ()=>{
                const blob = new Blob(state.audioChunks,{type:'audio/webm'});
                const reader = new FileReader();
                reader.onloadend = ()=>{
                    const msgData = {type:'audio', data:reader.result, sender: state.dPlate||state.passengerName, timestamp:Date.now()};
                    const msgKey = state.dPlate ? sanitizeKey(state.dPlate) : 'passenger_'+sanitizeKey(state.passengerKey);
                    messagesRef.child(msgKey).push(msgData);
                };
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t=>t.stop());
            };
            state.mediaRecorder.start();
            btn.classList.add('recording');
            state.recordingSeconds=0; timerEl.textContent='0s';
            state.recordingTimer = setInterval(()=>{ state.recordingSeconds++; timerEl.textContent=state.recordingSeconds+'s'; },1000);
        }).catch(()=>alert('無法取得麥克風權限'));
    }

    function stopRecording(btn, timerEl){
        if(state.mediaRecorder && state.mediaRecorder.state==='recording') state.mediaRecorder.stop();
        btn.classList.remove('recording');
        if(state.recordingTimer) clearInterval(state.recordingTimer);
        timerEl.textContent='0s';
    }

    function sendTextMessage(inputEl, sender){
        const text=inputEl.value.trim(); if(!text) return;
        const msgKey = state.dPlate ? sanitizeKey(state.dPlate) : 'passenger_'+sanitizeKey(state.passengerKey);
        messagesRef.child(msgKey).push({type:'text', text, sender, timestamp:Date.now()});
        inputEl.value='';
    }

    function playAudio(base64){ const a=new Audio(base64); a.play().catch(()=>{}); }

    function speakStation(stationName){
        if(!state.voiceUnlocked) return;
        if(stationName === state.lastSpokenStation) return;
        const now=Date.now();
        if(state.lastSpokenTime && now-state.lastSpokenTime<3000) return;
        state.lastSpokenStation = stationName;
        state.lastSpokenTime = now;
        if('speechSynthesis' in window){
            const u = new SpeechSynthesisUtterance(`下一站係${stationName}`);
            u.lang='zh-HK'; u.rate=0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(u);
        }
    }

    function watchBusForVoice(plate){
        if(!state.voiceUnlocked) return;
        const busRef = db.ref(`van/active_buses/${sanitizeKey(plate)}`);
        busRef.on('value', snap=>{ const d=snap.val(); if(d&&d.station) speakStation(d.station); });
    }

    function bindRecordButton(btn, timerEl){
        let isRecording = false;
        const start = (e) => { e.preventDefault(); if(!isRecording){ isRecording=true; startRecording(btn, timerEl); } };
        const stop = (e) => { e.preventDefault(); if(isRecording){ isRecording=false; stopRecording(btn, timerEl); } };
        btn.addEventListener('pointerdown', start);
        btn.addEventListener('pointerup', stop);
        btn.addEventListener('pointerleave', stop);
        btn.addEventListener('touchstart', start, {passive:false});
        btn.addEventListener('touchend', stop);
        btn.addEventListener('touchcancel', stop);
        btn.addEventListener('mousedown', start);
        btn.addEventListener('mouseup', stop);
        btn.addEventListener('mouseleave', stop);
    }

        document.getElementById('switch-dir').addEventListener('click', switchDirection);
        document.getElementById('btn-prev').addEventListener('click', movePrev);
        document.getElementById('btn-next').addEventListener('click', moveNext);
        document.getElementById('btn-add-pass').addEventListener('click', ()=>changePassengers(1));
        document.getElementById('btn-sub-pass').addEventListener('click', ()=>changePassengers(-1));
        document.getElementById('d-fullBtn').addEventListener('click', toggleFull);
        document.getElementById('d-car16').addEventListener('click', ()=>{ state.dMax=16; state.dPass=Math.min(state.dPass,16); state.dFull=state.dPass>=16; uploadDriverData(); updateDriverUI(); });
        document.getElementById('d-car19').addEventListener('click', ()=>{ state.dMax=19; state.dPass=Math.min(state.dPass,19); state.dFull=state.dPass>=19; uploadDriverData(); updateDriverUI(); });
        document.getElementById('d-mode-busy').addEventListener('click', ()=>{
            if(state.dActive && !confirm('切換模式會重置路線位置，確定要繼續嗎？')) return;
            state.dMode='busy'; state.dIndex=0; state.dDirection='out'; state.dIsNormalReversed=false;
            uploadDriverData(); updateDriverUI();
        });
        document.getElementById('d-mode-normal').addEventListener('click', ()=>{
            if(state.dActive && !confirm('切換模式會重置路線位置，確定要繼續嗎？')) return;
            state.dMode='normal'; state.dIndex=0; state.dIsNormalReversed=false; state.dDirection='out';
            uploadDriverData(); updateDriverUI();
        });

        function listenDriverMessages(){
            if(!state.dPlate) return;
            const msgKey = sanitizeKey(state.dPlate);
            messagesRef.child(msgKey).on('value', snap=>{
                const msgs = snap.val();
                const list = document.getElementById('driver-msg-list'); list.innerHTML='';
                if(msgs) Object.values(msgs).forEach(msg=>{
                    if(msg.type==='text') list.innerHTML += `<div><b>${msg.sender}:</b> ${msg.text}</div>`;
                    else if(msg.type==='audio') list.innerHTML += `<div class="audio-msg"><b>${msg.sender}:</b> <button class="play-audio-btn" data-audio="${msg.data}">播放語音</button></div>`;
                });
            });
        }

        bindRecordButton(document.getElementById('btn-driver-record'), document.getElementById('driver-timer'));
        document.getElementById('btn-driver-send').addEventListener('click', ()=>sendTextMessage(document.getElementById('driver-msg-input'), '司機'));
        document.getElementById('btn-driver-clear').addEventListener('click', ()=>{
            if(state.dPlate) messagesRef.child(sanitizeKey(state.dPlate)).remove();
        });
        document.getElementById('btn-logout').addEventListener('click', ()=>{
            if(state.dActive){
                const pk = sanitizeKey(state.dPlate);
                db.ref('van/active_buses/'+pk).onDisconnect().cancel();
                stopDriverUpload();
                state.dActive = false;
            }
            state.dPlate=''; state.dPhone=''; updateDriverUI(); showView('view-lobby');
        });

        function showAnnouncements(){
            announcementsRef.on('value', snap=>{
                const data = snap.val();
                const boxes = ['announce-box-list','announce-box-track','announce-box-driver'].map(id=>document.getElementById(id));
                boxes.forEach(box=>{
                    if(data&&data.text){ box.style.display='block'; box.textContent='📢 '+data.text; }
                    else box.style.display='none';
                });
            });
        }
        showAnnouncements();
        document.getElementById('d-route-container').style.display='none';
    });
})();
</script>
</body>
</html>
